<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" width="1040" height="520" font-family="Georgia, serif">
  <rect x="1" y="1" width="1038" height="518" rx="0" fill="#faf8f3" stroke="#c9c2b2" stroke-width="2"/>
  <text x="520" y="54" text-anchor="middle" fill="#211f1b" font-size="22" font-weight="700">The two strategies get <tspan font-style="italic">different</tspan> questions right.</text>

  <!-- venn -->
  <circle cx="380" cy="285" r="160" fill="#8a3b2e" fill-opacity="0.10" stroke="#8a3b2e" stroke-width="2"/>
  <circle cx="660" cy="285" r="160" fill="#3d6b4f" fill-opacity="0.10" stroke="#3d6b4f" stroke-width="2"/>

  <g text-anchor="middle">
    <text x="300" y="262" fill="#8a3b2e" font-size="17" font-weight="700">Single-shot</text>
    <text x="300" y="288" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.3">lookup questions</text>
    <text x="300" y="310" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.3">low Bloom tiers</text>

    <text x="740" y="262" fill="#3d6b4f" font-size="17" font-weight="700">Decompose</text>
    <text x="740" y="288" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.3">synthesis questions</text>
    <text x="740" y="310" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.3">high Bloom tiers</text>

    <text x="520" y="289" fill="#7a7365" font-family="Menlo, monospace" font-size="11" font-weight="700" letter-spacing="0.3">both</text>
  </g>

  <!-- union brace -->
  <path d="M230 452 v14 h580 v-14" fill="none" stroke="#211f1b" stroke-width="2"/>
  <line x1="520" y1="466" x2="520" y2="482" stroke="#211f1b" stroke-width="2"/>
  <text x="520" y="504" text-anchor="middle" fill="#211f1b" font-size="17" font-weight="700">Union &#8776; 94% &#8212; but only an <tspan fill="#996b16">oracle</tspan> router hits it</text>
</svg>
