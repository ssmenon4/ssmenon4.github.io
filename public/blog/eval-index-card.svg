<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Georgia, serif">
  <rect x="1" y="1" width="1198" height="673" rx="0" fill="#faf8f3" stroke="#c9c2b2" stroke-width="2"/>
  <text x="56" y="64" fill="#7a7365" font-family="Menlo, monospace" font-size="13" font-weight="700" letter-spacing="3">THE RAG EVALUATION GAP</text>

  <g transform="rotate(-1.1 600 380)">
    <!-- card -->
    <rect x="152" y="108" width="896" height="500" rx="0" fill="#faf8f3" stroke="#c9c2b2" stroke-width="2"/>
    <!-- tape -->
    <rect x="548" y="92" width="104" height="34" rx="0" fill="#996b16" fill-opacity="0.18" transform="rotate(-3 600 109)"/>
    <!-- margin + header rules -->
    <line x1="228" y1="120" x2="228" y2="596" stroke="#8a3b2e" stroke-width="2" stroke-opacity="0.55"/>
    <text x="256" y="168" fill="#211f1b" font-size="27" font-weight="700">Before you trust a RAG result</text>
    <text x="256" y="196" fill="#7a7365" font-family="Menlo, monospace" font-size="13" letter-spacing="0.3">&#8212; the six fixes that fit on an index card &#8212;</text>
    <line x1="152" y1="214" x2="1048" y2="214" stroke="#c9c2b2" stroke-width="2"/>
    <line x1="152" y1="219" x2="1048" y2="219" stroke="#c9c2b2" stroke-width="1"/>

    <!-- rows -->
    <g font-size="18">
      <!-- row template: checkbox + gap (bold ink) + arrow + fix (grey) -->
      <g transform="translate(0,262)">
        <rect x="246" y="-16" width="24" height="24" rx="0" fill="#dde9df" stroke="#3d6b4f" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#3d6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#211f1b" font-weight="700">Proprietary-only benchmark<tspan fill="#7a7365" font-weight="400">  &#8594;  </tspan><tspan fill="#5f594e" font-weight="400">add a public one (BEIR / ViDoRe / FinanceBench)</tspan></text>
      </g>
      <g transform="translate(0,318)">
        <rect x="246" y="-16" width="24" height="24" rx="0" fill="#dde9df" stroke="#3d6b4f" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#3d6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#211f1b" font-weight="700">Strawman baseline<tspan fill="#7a7365" font-weight="400">  &#8594;  </tspan><tspan fill="#5f594e" font-weight="400">beat BM25, a dense embedder, Doc2Query, a reranker</tspan></text>
      </g>
      <g transform="translate(0,374)">
        <rect x="246" y="-16" width="24" height="24" rx="0" fill="#dde9df" stroke="#3d6b4f" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#3d6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#211f1b" font-weight="700">No ablations<tspan fill="#7a7365" font-weight="400">  &#8594;  </tspan><tspan fill="#5f594e" font-weight="400">isolate the one variable; report n + variance</tspan></text>
      </g>
      <g transform="translate(0,430)">
        <rect x="246" y="-16" width="24" height="24" rx="0" fill="#dde9df" stroke="#3d6b4f" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#3d6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#211f1b" font-weight="700">Oracle number<tspan fill="#7a7365" font-weight="400">  &#8594;  </tspan><tspan fill="#5f594e" font-weight="400">report the realized number beside it</tspan></text>
      </g>
      <g transform="translate(0,486)">
        <rect x="246" y="-16" width="24" height="24" rx="0" fill="#dde9df" stroke="#3d6b4f" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#3d6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#211f1b" font-weight="700">Trusted LLM judge<tspan fill="#7a7365" font-weight="400">  &#8594;  </tspan><tspan fill="#5f594e" font-weight="400">spot-check vs. human labels, report agreement</tspan></text>
      </g>
      <g transform="translate(0,542)">
        <rect x="246" y="-16" width="24" height="24" rx="0" fill="#dde9df" stroke="#3d6b4f" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#3d6b4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#211f1b" font-weight="700">Unmeasured thesis<tspan fill="#7a7365" font-weight="400">  &#8594;  </tspan><tspan fill="#5f594e" font-weight="400">measure the exact quantity you're claiming</tspan></text>
      </g>
    </g>
  </g>
</svg>
