<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="1198" height="673" rx="24" fill="#FFFFFF" stroke="#E6E4DE" stroke-width="2"/>
  <text x="56" y="64" fill="#9A6A4E" font-size="15" font-weight="700" letter-spacing="3">THE RAG EVALUATION GAP</text>

  <g transform="rotate(-1.1 600 380)">
    <!-- card -->
    <rect x="152" y="108" width="896" height="500" rx="14" fill="#FFFDF7" stroke="#E2DDCE" stroke-width="2"/>
    <rect x="152" y="108" width="896" height="500" rx="14" fill="none" stroke="#00000010" stroke-width="6" transform="translate(3 5)"/>
    <!-- tape -->
    <rect x="548" y="92" width="104" height="34" rx="3" fill="#EBD9A6" fill-opacity="0.55" transform="rotate(-3 600 109)"/>
    <!-- red margin + header rules -->
    <line x1="228" y1="120" x2="228" y2="596" stroke="#E4A0A0" stroke-width="2"/>
    <text x="256" y="168" fill="#1A1A1A" font-size="27" font-weight="700">Before you trust a RAG result</text>
    <text x="256" y="196" fill="#8A8577" font-size="15" font-style="italic">— the six fixes that fit on an index card —</text>
    <line x1="152" y1="214" x2="1048" y2="214" stroke="#E4A0A0" stroke-width="2"/>
    <line x1="152" y1="219" x2="1048" y2="219" stroke="#E4A0A0" stroke-width="1"/>

    <!-- rows -->
    <g font-size="18">
      <!-- row template: checkbox + gap (bold ink) + arrow + fix (grey) -->
      <g transform="translate(0,262)">
        <rect x="246" y="-16" width="24" height="24" rx="5" fill="#E6F6ED" stroke="#059669" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#1A1A1A" font-weight="700">Proprietary-only benchmark<tspan fill="#B0AA98" font-weight="400">  →  </tspan><tspan fill="#5B5749" font-weight="400">add a public one (BEIR / ViDoRe / FinanceBench)</tspan></text>
      </g>
      <g transform="translate(0,318)">
        <rect x="246" y="-16" width="24" height="24" rx="5" fill="#E6F6ED" stroke="#059669" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#1A1A1A" font-weight="700">Strawman baseline<tspan fill="#B0AA98" font-weight="400">  →  </tspan><tspan fill="#5B5749" font-weight="400">beat BM25, a dense embedder, Doc2Query, a reranker</tspan></text>
      </g>
      <g transform="translate(0,374)">
        <rect x="246" y="-16" width="24" height="24" rx="5" fill="#E6F6ED" stroke="#059669" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#1A1A1A" font-weight="700">No ablations<tspan fill="#B0AA98" font-weight="400">  →  </tspan><tspan fill="#5B5749" font-weight="400">isolate the one variable; report n + variance</tspan></text>
      </g>
      <g transform="translate(0,430)">
        <rect x="246" y="-16" width="24" height="24" rx="5" fill="#E6F6ED" stroke="#059669" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#1A1A1A" font-weight="700">Oracle number<tspan fill="#B0AA98" font-weight="400">  →  </tspan><tspan fill="#5B5749" font-weight="400">report the realized number beside it</tspan></text>
      </g>
      <g transform="translate(0,486)">
        <rect x="246" y="-16" width="24" height="24" rx="5" fill="#E6F6ED" stroke="#059669" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#1A1A1A" font-weight="700">Trusted LLM judge<tspan fill="#B0AA98" font-weight="400">  →  </tspan><tspan fill="#5B5749" font-weight="400">spot-check vs. human labels, report agreement</tspan></text>
      </g>
      <g transform="translate(0,542)">
        <rect x="246" y="-16" width="24" height="24" rx="5" fill="#E6F6ED" stroke="#059669" stroke-width="1.5"/>
        <path d="M251 -4 L256 1 L266 -11" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="288" y="1" fill="#1A1A1A" font-weight="700">Unmeasured thesis<tspan fill="#B0AA98" font-weight="400">  →  </tspan><tspan fill="#5B5749" font-weight="400">measure the exact quantity you're claiming</tspan></text>
      </g>
    </g>
  </g>

  <text x="600" y="646" text-anchor="middle" fill="#9CA3AF" font-size="14" font-style="italic">The idea is the easy part. The rigor is the moat.</text>
</svg>
