<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 690" width="1160" height="690" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/></marker>
    <marker id="aw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#475569"/></marker>
  </defs>
  <rect x="1" y="1" width="1158" height="688" rx="20" fill="#FFFFFF" stroke="#E6E4DE" stroke-width="2"/>

  <text x="40" y="50" fill="#1A1A1A" font-size="23" font-weight="700">The engine: a 4-stroke loop, gated by typed tool calls.</text>
  <text x="40" y="76" fill="#6B7280" font-size="15">Three role contracts, no bleed — and every state change is a logged, replayable call.</text>

  <!-- return arc: the loop -->
  <path d="M974 150 L974 132 Q974 124 964 124 L180 124 Q170 124 170 132 L170 150" fill="none" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ag)"/>
  <text x="572" y="118" text-anchor="middle" fill="#6B7280" font-size="13" font-style="italic">the loop · next turn</text>

  <!-- four stroke boxes -->
  <!-- S1 DM -->
  <rect x="52" y="150" width="236" height="120" rx="12" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
  <text x="170" y="182" text-anchor="middle" fill="#B45309" font-size="16" font-weight="700">Stroke 1 · DM</text>
  <text x="170" y="207" text-anchor="middle" fill="#7A5A34" font-size="12.5">narrates &amp; resolves last</text>
  <text x="170" y="224" text-anchor="middle" fill="#7A5A34" font-size="12.5">turn's admitted actions</text>
  <text x="170" y="252" text-anchor="middle" fill="#A9772F" font-size="11">write_library_entry · write_dm_plan</text>

  <!-- S2 Orchestrator -->
  <rect x="320" y="150" width="236" height="120" rx="12" fill="#EEF3FF" stroke="#2563EB" stroke-width="2"/>
  <text x="438" y="182" text-anchor="middle" fill="#2563EB" font-size="16" font-weight="700">Stroke 2 · Orchestrator</text>
  <text x="438" y="207" text-anchor="middle" fill="#4A5E8C" font-size="12.5">canonize · set thresholds</text>
  <text x="438" y="224" text-anchor="middle" fill="#4A5E8C" font-size="12.5">contact relevant players</text>
  <text x="438" y="252" text-anchor="middle" fill="#5B77B8" font-size="11">write_story_summary · contact_players</text>

  <!-- S3 Players -->
  <rect x="588" y="150" width="236" height="120" rx="12" fill="#EAF6F3" stroke="#0F766E" stroke-width="2"/>
  <text x="706" y="182" text-anchor="middle" fill="#0F766E" font-size="16" font-weight="700">Stroke 3 · Players ∥</text>
  <text x="706" y="207" text-anchor="middle" fill="#3F7C74" font-size="12.5">reason in parallel;</text>
  <text x="706" y="224" text-anchor="middle" fill="#3F7C74" font-size="12.5">declare intent only</text>
  <text x="706" y="252" text-anchor="middle" fill="#2E8B7F" font-size="11">commit_action  (terminal)</text>

  <!-- S4 Orchestrator -->
  <rect x="856" y="150" width="236" height="120" rx="12" fill="#EEF3FF" stroke="#2563EB" stroke-width="2"/>
  <text x="974" y="182" text-anchor="middle" fill="#2563EB" font-size="16" font-weight="700">Stroke 4 · Orchestrator</text>
  <text x="974" y="207" text-anchor="middle" fill="#4A5E8C" font-size="12.5">admit / reject · roll dice</text>
  <text x="974" y="224" text-anchor="middle" fill="#4A5E8C" font-size="12.5">Oracle · finalize turn</text>
  <text x="974" y="252" text-anchor="middle" fill="#5B77B8" font-size="11">admit_action · finalize_turn</text>

  <!-- inter-stroke arrows -->
  <g stroke="#9CA3AF" stroke-width="2" marker-end="url(#ag)">
    <line x1="288" y1="210" x2="318" y2="210"/>
    <line x1="556" y1="210" x2="586" y2="210"/>
    <line x1="824" y1="210" x2="854" y2="210"/>
  </g>

  <!-- log I/O: one neutral colour; solid = write (down), dashed = read (up) -->
  <g stroke="#475569" marker-end="url(#aw)">
    <!-- writes: every stroke mutates state via a tool call -->
    <g stroke-width="2">
      <line x1="140" y1="270" x2="140" y2="452"/>
      <line x1="428" y1="270" x2="428" y2="452"/>
      <line x1="716" y1="270" x2="716" y2="452"/>
      <line x1="964" y1="270" x2="964" y2="452"/>
    </g>
    <!-- reads: DM & players pull context by semantic search -->
    <g stroke-width="2" stroke-dasharray="5 5">
      <line x1="200" y1="452" x2="200" y2="272"/>
      <line x1="696" y1="452" x2="696" y2="272"/>
    </g>
  </g>

  <!-- legend (placed in the open gap, clear of all arrows) -->
  <rect x="460" y="330" width="224" height="76" rx="10" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1.5"/>
  <line x1="478" y1="357" x2="510" y2="357" stroke="#475569" stroke-width="2" marker-end="url(#aw)"/>
  <text x="520" y="361" fill="#475569" font-size="12.5" font-weight="700">write · tool call</text>
  <line x1="478" y1="384" x2="510" y2="384" stroke="#475569" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#aw)"/>
  <text x="520" y="388" fill="#475569" font-size="12.5">read · pull context</text>

  <!-- substrate -->
  <rect x="52" y="452" width="1056" height="118" rx="14" fill="#F7FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="580" y="486" text-anchor="middle" fill="#1A1A1A" font-size="15.5" font-weight="700">Durable event log &#160;·&#160; typed, owned stores &#160;·&#160; Library &amp; Player Memory vector-indexed (ChromaDB)</text>
  <g font-size="12.5">
    <g fill="#EEF1F6"><rect x="92" y="508" width="118" height="34" rx="17" stroke="#C3CBD8" stroke-width="1"/><rect x="226" y="508" width="230" height="34" rx="17" stroke="#C3CBD8" stroke-width="1"/><rect x="472" y="508" width="170" height="34" rx="17" stroke="#C3CBD8" stroke-width="1"/><rect x="658" y="508" width="150" height="34" rx="17" stroke="#C3CBD8" stroke-width="1"/><rect x="824" y="508" width="242" height="34" rx="17" stroke="#C3CBD8" stroke-width="1"/></g>
    <g fill="#4A5568" text-anchor="middle">
      <text x="151" y="530">Library</text>
      <text x="341" y="530">Story Summary / Record</text>
      <text x="557" y="530">Player Memory</text>
      <text x="733" y="530">Self-ledger</text>
      <text x="945" y="530">Routing / Admit Records</text>
    </g>
  </g>

  <text x="580" y="606" text-anchor="middle" fill="#4A4A4A" font-size="13.5" font-weight="700">The DM authors the world · the Orchestrator referees · players only declare intent.</text>
  <text x="580" y="630" text-anchor="middle" fill="#9CA3AF" font-size="13" font-style="italic">Nothing is canon until a tool call writes it to the log — which is exactly what makes a run replayable and measurable.</text>
</svg>
