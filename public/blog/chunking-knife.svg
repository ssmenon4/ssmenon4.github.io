<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Georgia, serif">
  <rect x="1" y="1" width="1198" height="673" rx="0" fill="#faf8f3" stroke="#c9c2b2" stroke-width="2"/>

  <text x="56" y="70" fill="#7a7365" font-family="Menlo, monospace" font-size="13" font-weight="700" letter-spacing="3">CHUNKING &#183; ATOMICITY</text>
  <text x="56" y="112" fill="#211f1b" font-size="32" font-weight="700">Where you put the knife.</text>

  <!-- ============ LEFT: fixed-size cut ============ -->
  <g>
    <rect x="56" y="188" width="500" height="404" rx="0" fill="#faf8f3" stroke="#8a3b2e" stroke-width="1.5"/>
    <text x="82" y="228" fill="#8a3b2e" font-size="19" font-weight="700">Fixed-size cut</text>
    <text x="82" y="250" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.5">slices wherever the character count runs out</text>

    <!-- idea 1 (fine) -->
    <g fill="#c9c2b2"><rect x="82" y="278" width="448" height="12" rx="0"/><rect x="82" y="300" width="410" height="12" rx="0"/></g>
    <!-- the torn idea -->
    <rect x="74" y="326" width="464" height="86" rx="0" fill="#f2ded9"/>
    <g fill="#c98d80"><rect x="82" y="338" width="448" height="12" rx="0"/></g>
    <g fill="#c98d80"><rect x="82" y="388" width="360" height="12" rx="0"/></g>
    <!-- cut line right through it -->
    <line x1="64" y1="369" x2="548" y2="369" stroke="#8a3b2e" stroke-width="2.5" stroke-dasharray="9 7"/>
    <path d="M548 369 l22 -9 v18 z" fill="#8a3b2e"/>
    <text x="306" y="363" text-anchor="middle" fill="#8a3b2e" font-family="Menlo, monospace" font-size="12" font-weight="700" letter-spacing="0.5">&#8212; cut lands mid-thought &#8212;</text>
    <!-- idea 2 (fine) -->
    <g fill="#c9c2b2"><rect x="82" y="436" width="448" height="12" rx="0"/><rect x="82" y="458" width="300" height="12" rx="0"/></g>

    <text x="306" y="512" text-anchor="middle" fill="#8a3b2e" font-size="16" font-weight="700">One idea, split across two chunks.</text>
    <text x="306" y="536" text-anchor="middle" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.5">Neither half retrieves well on its own.</text>
  </g>

  <!-- ============ RIGHT: atomic cut ============ -->
  <g>
    <rect x="644" y="188" width="500" height="404" rx="0" fill="#faf8f3" stroke="#3d6b4f" stroke-width="1.5"/>
    <text x="670" y="228" fill="#3d6b4f" font-size="19" font-weight="700">Atomic cut</text>
    <text x="670" y="250" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.5">falls on the boundary between ideas</text>

    <!-- idea A block -->
    <rect x="662" y="272" width="464" height="74" rx="0" fill="#dde9df"/>
    <g fill="#8fb89e"><rect x="670" y="286" width="448" height="12" rx="0"/><rect x="670" y="308" width="448" height="12" rx="0"/><rect x="670" y="330" width="360" height="12" rx="0"/></g>
    <!-- clean cut in the gap -->
    <line x1="652" y1="362" x2="1136" y2="362" stroke="#3d6b4f" stroke-width="2.5" stroke-dasharray="9 7"/>
    <path d="M1136 362 l22 -9 v18 z" fill="#3d6b4f"/>
    <!-- idea B block -->
    <rect x="662" y="378" width="464" height="74" rx="0" fill="#dde9df"/>
    <g fill="#8fb89e"><rect x="670" y="392" width="448" height="12" rx="0"/><rect x="670" y="414" width="448" height="12" rx="0"/><rect x="670" y="436" width="300" height="12" rx="0"/></g>

    <text x="894" y="512" text-anchor="middle" fill="#3d6b4f" font-size="16" font-weight="700">Each chunk is one self-contained idea.</text>
    <text x="894" y="536" text-anchor="middle" fill="#5f594e" font-family="Menlo, monospace" font-size="12" letter-spacing="0.5">Nothing significant sits at the boundary.</text>
  </g>
</svg>
