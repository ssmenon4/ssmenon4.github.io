<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" width="1040" height="520" font-family="Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="1038" height="518" rx="18" fill="#FFFFFF" stroke="#E6E4DE" stroke-width="2"/>
  <text x="40" y="52" fill="#1A1A1A" font-size="22" font-weight="700">Anisotropy: embeddings crowd into a narrow cone, not the whole sphere.</text>

  <!-- LEFT: isotropic ideal -->
  <g>
    <circle cx="270" cy="280" r="150" fill="#F7FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <g fill="#94A3B8">
      <circle cx="200" cy="180" r="6"/><circle cx="330" cy="170" r="6"/><circle cx="150" cy="270" r="6"/>
      <circle cx="380" cy="290" r="6"/><circle cx="220" cy="380" r="6"/><circle cx="330" cy="380" r="6"/>
      <circle cx="270" cy="150" r="6"/><circle cx="180" cy="360" r="6"/><circle cx="370" cy="210" r="6"/>
      <circle cx="160" cy="330" r="6"/>
    </g>
    <!-- two example vectors, wide angle -->
    <line x1="270" y1="280" x2="170" y2="200" stroke="#2563EB" stroke-width="2.5"/>
    <line x1="270" y1="280" x2="360" y2="360" stroke="#2563EB" stroke-width="2.5"/>
    <path d="M225 244 A56 56 0 0 0 316 328" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="270" y="460" text-anchor="middle" fill="#059669" font-size="16" font-weight="700">Isotropic (ideal)</text>
    <text x="270" y="484" text-anchor="middle" fill="#6B7280" font-size="13">unrelated texts → wide angle → low similarity</text>
  </g>

  <!-- RIGHT: anisotropic reality -->
  <g>
    <circle cx="770" cy="280" r="150" fill="#F7FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <!-- the cone -->
    <path d="M770 280 L716 140 A150 150 0 0 1 824 140 Z" fill="#E4ECFF" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 5"/>
    <g fill="#94A3B8">
      <circle cx="760" cy="175" r="6"/><circle cx="784" cy="195" r="6"/><circle cx="770" cy="220" r="6"/>
      <circle cx="750" cy="200" r="6"/><circle cx="792" cy="225" r="6"/><circle cx="765" cy="150" r="6"/>
      <circle cx="800" cy="185" r="6"/><circle cx="744" cy="235" r="6"/>
    </g>
    <!-- two example vectors, tiny angle -->
    <line x1="770" y1="280" x2="758" y2="150" stroke="#DC2626" stroke-width="2.5"/>
    <line x1="770" y1="280" x2="792" y2="160" stroke="#DC2626" stroke-width="2.5"/>
    <text x="770" y="460" text-anchor="middle" fill="#DC2626" font-size="16" font-weight="700">Anisotropic (real)</text>
    <text x="770" y="484" text-anchor="middle" fill="#6B7280" font-size="13">even unrelated texts → small angle → high similarity</text>
  </g>
</svg>
